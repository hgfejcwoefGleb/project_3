<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор входа | КриптоIQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4361ee;   
            --secondary-color: #3f37c9;
            --accent-color: #4895ef;
            --dark-color: #2b2d42;
            --light-color: #f8f9fa;
            --success-color: #4cc9f0;
            --danger-color: #f72585;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: var(--dark-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            width: 90%;
            max-width: 500px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            text-align: center;
        }
        
        .login-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 32px;
        }
        
        .login-header h1 {
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .login-content {
            padding: 32px;
        }
        
        .login-options {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .login-option {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .guest-input {
            margin-bottom: 8px;
        }

        .guest-input input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .guest-input input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 2px rgba(67, 97, 238, 0.2);
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            border: none;
            width: 100%;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.2);
        }
        
        .btn-secondary {
            background-color: white;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }
        
        .btn-secondary:hover {
            background-color: #f0f2f5;
        }
        
        .btn i {
            margin-right: 10px;
            font-size: 18px;
        }
        
        .option-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--dark-color);
        }
        
        @media (min-width: 600px) {
            .login-option {
                flex-direction: row;
                align-items: center;
            }
            
            .guest-input {
                flex-grow: 1;
                margin-bottom: 0;
            }
            
            .btn {
                width: auto;
                min-width: 180px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">   
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Добро пожаловать!</h1>
            <p>Выберите тип входа в игру "КриптоIQ"</p>
        </div>
        
        <div class="login-content">
            <div class="login-options">
                <!-- Гостевой вход -->
                <form method="POST" action="/login" class="login-option">
                    <div class="option-title">Гостевой вход:</div>
                    <div class="guest-input">
                        <input type="text" name="guest_name" placeholder="Введите имя" required>
                    </div>
                    <button type="submit" name="guest" value="guest" class="btn btn-primary">
                        <i class="fas fa-user"></i> Войти
                    </button>
                </form>
                
                <!-- Вход администратора -->
                <form method="POST" action="/login" class="login-option">
                    <div class="option-title">Вход администратора:</div>
                    <button type="submit" name="admin" value="admin" class="btn btn-secondary">
                        <i class="fas fa-lock"></i> Войти
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
