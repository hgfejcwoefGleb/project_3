<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Кибер-игра</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: #ffffff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 400px;
    }

    .title {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 18px;
      margin-bottom: 30px;
      color: #555;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      font-size: 16px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-start {
      background-color: #d9f2dd;
      border: 1px solid #4CAF50;
      color: #333;
    }

    .btn-start:hover {
      background-color: #c8e6c9;
    }

    .btn-admin {
      background-color: #ffffff;
      border: 1px solid #000;
      color: #000;
    }

    .btn-admin:hover {
      background-color: #f5f5f5;
    }

    a {
      text-decoration: underline;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Кибер-игра "<a href="#">придуматьназвание</a>"</div>
    <div class="subtitle">Добро пожаловать!</div>
    <form method="POST" action="/login">
        <button class="btn btn-start" name="guest" value="guest">Начать игру</button>
        <button class="btn btn-admin" name="admin" value="admin">Войти как администратор</button>
    </form>
  </div>
</body>
</html>
