<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рейтинг игроков</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --accent-color: #4895ef;
            --dark-color: #2b2d42;
            --light-color: #f8f9fa;
            --success-color: #4cc9f0;
            --warning-color: #f8961e;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: var(--dark-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .rating-container {
            width: 90%;
            max-width: 800px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .rating-header {
            position: relative;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 24px;
            text-align: center;
        }
        
        .back-button {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 16px;
            transition: opacity 0.3s;
        }
        
        .back-button:hover {
            opacity: 0.8;
        }
        
        .back-button i {
            margin-right: 8px;
        }
        
        .rating-header h1 {
            font-weight: 500;
            margin: 0 auto;
            max-width: 70%;
        }
        
        .rating-content {
            padding: 24px;
        }
        
        .rating-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        
        .rating-table th, 
        .rating-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }
        
        .rating-table th {
            background-color: #f8f9fa;
            font-weight: 500;
            color: #495057;
        }
        
        .rating-table tr:last-child td {
            border-bottom: none;
        }
        
        .rating-table tr:hover {
            background-color: #f8f9fa;
        }
        
        .player-rank {
            font-weight: 700;
            color: var(--primary-color);
            width: 40px;
        }
        
        .player-name {
            font-weight: 500;
        }
        
        .player-score {
            font-weight: 700;
            color: var(--warning-color);
            text-align: right;
        }
        
        .medal {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .gold {
            background-color: gold;
        }
        
        .silver {
            background-color: silver;
        }
        
        .bronze {
            background-color: #cd7f32;
        }
        
        @media (max-width: 600px) {
            .rating-header h1 {
                max-width: 60%;
                font-size: 1.5rem;
            }
            
            .rating-table th, 
            .rating-table td {
                padding: 8px 12px;
                font-size: 14px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="rating-container">
        <div class="rating-header">
            <a href="/admin" class="back-button">
                <i class="fas fa-arrow-left"></i> Назад
            </a>
            <h1>Рейтинг игроков</h1>
        </div>
        
        <div class="rating-content">
            <table class="rating-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Игрок</th>
                        <th class="text-right">Очки</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 1 место -->
                    <tr>
                        <td class="player-rank"><span class="medal gold"></span>1</td>
                        <td class="player-name">Алексей Петров</td>
                        <td class="player-score">9850</td>
                    </tr>
                    <!-- 2 место -->
                    <tr>
                        <td class="player-rank"><span class="medal silver"></span>2</td>
                        <td class="player-name">Мария Иванова</td>
                        <td class="player-score">8720</td>
                    </tr>
                    <!-- 3 место -->
                    <tr>
                        <td class="player-rank"><span class="medal bronze"></span>3</td>
                        <td class="player-name">Дмитрий Сидоров</td>
                        <td class="player-score">7650</td>
                    </tr>
                    <!-- 4 место -->
                    <tr>
                        <td class="player-rank">4</td>
                        <td class="player-name">Ольга Кузнецова</td>
                        <td class="player-score">7210</td>
                    </tr>
                    <!-- 5 место -->
                    <tr>
                        <td class="player-rank">5</td>
                        <td class="player-name">Иван Смирнов</td>
                        <td class="player-score">6890</td>
                    </tr>
                    <!-- 6 место -->
                    <tr>
                        <td class="player-rank">6</td>
                        <td class="player-name">Екатерина Васильева</td>
                        <td class="player-score">6540</td>
                    </tr>
                    <!-- 7 место -->
                    <tr>
                        <td class="player-rank">7</td>
                        <td class="player-name">Андрей Попов</td>
                        <td class="player-score">6210</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
