<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результат игры | Квиз</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --accent-color: #4895ef;
            --dark-color: #2b2d42;
            --light-color: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: var(--dark-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .result-container {
            width: 90%;
            max-width: 600px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px;
            text-align: center;
        }

        .result-container h1 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .result-container p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 12px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        .btn-rating {
            background-color: var(--accent-color);
        }

        .btn-rating:hover {
            background-color: #3a7bc8;
        }

        @media (max-width: 500px) {
            .result-container {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="result-container">
        <h1>Игра завершена!</h1>
        <p>Вы правильно ответили на <strong>{{ score }}</strong> из <strong>{{ total }}</strong> вопросов.</p>

        <div class="btn-group">
            <a href="/play_again" class="btn"><i class="fas fa-redo"></i> Сыграть снова</a>
            <a href="/progress" class="btn btn-rating"><i class="fas fa-trophy"></i> Посмотреть рейтинг</a>
            <a href="/" class="btn"><i class="fas fa-home"></i> На главную</a>
        </div>
    </div>
</body>
</html>
