<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список вопросов | Админ-панель</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --accent-color: #4895ef;
            --dark-color: #2b2d42;
            --light-color: #f8f9fa;
            --danger-color: #f72585;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: var(--dark-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .questions-container {
            width: 90%;
            max-width: 800px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .questions-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 24px;
            text-align: center;
        }
        
        .questions-header h1 {
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .questions-content {
            padding: 24px;
        }
        
        .action-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            border: none;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background-color: white;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }
        
        .btn-secondary:hover {
            background-color: #f0f2f5;
        }
        
        .btn i {
            margin-right: 8px;
        }
        
        .questions-list {
            border: 1px solid #e9ecef;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .question-item {
            padding: 16px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .question-item:last-child {
            border-bottom: none;
        }
        
        .question-actions {
            display: flex;
            gap: 8px;
        }
        
        .action-icon {
            color: #6c757d;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .action-icon:hover {
            color: var(--primary-color);
        }
        
        .question-text {
            flex-grow: 1;
        }
        
        .question-answer {
            font-size: 0.9em;
            color: #6c757d;
            margin-top: 4px;
        }
        
        @media (max-width: 600px) {
            .action-buttons {
                flex-direction: column;
            }
            
            .question-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .question-actions {
                margin-top: 8px;
                align-self: flex-end;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="questions-container">
        <div class="questions-header">
            <h1>Список вопросов админа</h1>
        </div>
        
        <div class="questions-content">
            <div class="action-buttons">
                <a href="/add-question" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Добавить вопрос
                </a>
                <a href="/admin_main_window" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Назад
                </a>
            </div>
            
            <div class="questions-list" id="questions-list">
                <!-- Вопросы будут вставлены сюда динамически -->
                {{ questions | safe }}
            </div>
        </div>
    </div>

    <script>
        // Дополнительный JavaScript для обработки действий
        document.addEventListener('DOMContentLoaded', function() {
            
            document.querySelectorAll('.action-icon.fa-trash').forEach(icon => {
                icon.addEventListener('click', function() {
                    if(confirm('Вы уверены, что хотите удалить этот вопрос?')) {
                        const questionId = this.closest('.question-item').dataset.id;
                        fetch(`/delete-question/${questionId}`, { method: 'DELETE' })
                            .then(response => {
                                if(response.ok) {
                                    window.location.reload();
                                }
                            });
                    }
                });
            });
        });
    </script>
</body>
</html>
